services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shorturls
      POSTGRES_PASSWORD: shorturls
      POSTGRES_DB: shorturls
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shorturls"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shorturls-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shorturls-net

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: "postgres://shorturls:shorturls@postgres:5432/shorturls?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      BASE_URL: "http://localhost:8080"
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shorturls-net

volumes:
  pgdata:

networks:
  shorturls-net:
